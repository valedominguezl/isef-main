name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build 

      - name: Upload build to VPS
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          # 1. Definir nombre de la versión
          BUILD_DIR=$(date +%Y%m%d%H%M%S)

          # 2. Crear la carpeta en el VPS antes de subir
          ssh -i key.pem -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "mkdir -p /var/www/builds/$BUILD_DIR"

          # 3. Subir los archivos compilados (asegúrate de que './dist/' sea la ruta correcta)
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" ./dist/ $VPS_USER@$VPS_HOST:/var/www/builds/$BUILD_DIR/

          # 4. Actualizar el link simbólico
          ssh -i key.pem -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
            LATEST_BUILD=$(ls -td /var/www/builds/* | head -1)
            if [ -n "$LATEST_BUILD" ]; then
              rm -rf /var/www/html
              ln -sfn "$LATEST_BUILD" /var/www/html
              sudo chown -R www-data:www-data /var/www/builds
              sudo chmod -R 755 /var/www/builds
              echo "🚀 Despliegue completado: $LATEST_BUILD"
            else
              echo "❌ Error: No se encontró ninguna carpeta en /var/www/builds"
              exit 1
            fi
          EOF
          rm -f key.pem
