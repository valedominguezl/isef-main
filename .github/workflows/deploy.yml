name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build 

      - name: Upload build to VPS
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          # Crear la carpeta de la versión con el timestamp actual
          BUILD_DIR=$(date +%Y%m%d%H%M%S)
          ssh -i key.pem -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "mkdir -p /var/www/builds/$BUILD_DIR"

          # Subir solo los archivos compilados (lo único que Nginx necesita)
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" ./dist/ $VPS_USER@$VPS_HOST:/var/www/builds/$BUILD_DIR/

          # Actualización atómica del link simbólico
          ssh -i key.pem -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
            # Buscamos la carpeta más reciente por fecha de creación
            LATEST_BUILD=$(ls -td /var/www/builds/* | head -1)
            
            # Forzamos la creación del link a la raíz de Nginx
            ln -sfn "$LATEST_BUILD" /var/www/html
            
            echo "🚀 Despliegue completado: $LATEST_BUILD"
          EOF

          rm -f key.pem
