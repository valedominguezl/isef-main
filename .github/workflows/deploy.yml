name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Upload build to VPS
        env:
          PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "$PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          
          # Crear carpeta con timestamp para la nueva versión
          BUILD_DIR=$(date +%Y%m%d%H%M%S)
          ssh -i key.pem -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST "mkdir -p /var/www/builds/$BUILD_DIR"

          # Subir solo la carpeta dist generada por Vite
          rsync -avz -e "ssh -i key.pem -o StrictHostKeyChecking=no" ./dist/ $VPS_USER@$VPS_HOST:/var/www/builds/$BUILD_DIR/

          # Actualizar el link simbólico para activar la nueva versión
          ssh -i key.pem -o StrictHostKeyChecking=no $VPS_USER@$VPS_HOST << 'EOF'
            ln -sfn /var/www/builds/$(ls -t /var/www/builds/ | head -1) /var/www/html
            echo "🚀 Despliegue exitoso"
          EOF

          rm -f key.pem